<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orden de Trabajo — Almacén A</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface2:#f1efe9;
  --border:rgba(0,0,0,0.09);--border-md:rgba(0,0,0,0.16);
  --text:#1a1a18;--text2:#6b6a64;--text3:#9e9c95;
  --danger-bg:#fdf0ef;--danger-txt:#9b2c2c;--danger-bdr:#f5c0bc;
  --warn-bg:#fef9ec;--warn-txt:#92600a;--warn-bdr:#f5dfa0;
  --ok-bg:#eef7f1;--ok-txt:#1e6b3e;--ok-bdr:#b3ddc4;
  --info-bg:#eef4fd;--info-txt:#1a4f8a;--info-bdr:#b8d0f5;
  --r:8px;--rl:12px;
  --font:-apple-system,'Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#131311;--surface:#1e1e1b;--surface2:#272724;
  --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.15);
  --text:#e8e6df;--text2:#9e9c94;--text3:#6b6a63;
  --danger-bg:#2a1515;--danger-txt:#f08080;--danger-bdr:#5c2020;
  --warn-bg:#231e0d;--warn-txt:#d4a240;--warn-bdr:#5a4510;
  --ok-bg:#0e2016;--ok-txt:#5dbf82;--ok-bdr:#1e5035;
  --info-bg:#0d1a2e;--info-txt:#6baaf5;--info-bdr:#1e3d6e;
}}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;padding-bottom:100px}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-left h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
.hdr-left p{font-size:11px;color:var(--text2);margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.btn-teams{font-size:12px;padding:7px 14px;border-radius:var(--r);background:#5059C9;color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:500;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s}
.btn-teams:hover{opacity:.9}
.btn-teams svg{width:14px;height:14px;flex-shrink:0}

/* PROGRESS */
.prog-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2);position:sticky;top:57px;z-index:99}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ok-txt);border-radius:2px;transition:width .4s}

/* CONTENT */
.content{padding:14px 20px;max-width:680px;margin:0 auto}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;transition:border-color .2s,background .2s}
.card.done{border-color:var(--ok-bdr)}
.card-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--surface2);border-bottom:1px solid var(--border);transition:background .2s}
.card.done .card-hdr{background:var(--ok-bg)}
.card-num{width:24px;height:24px;border-radius:50%;background:var(--border-md);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono);transition:background .2s,color .2s}
.card.done .card-num{background:var(--ok-txt);color:#fff}
.card-tipo{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap}
.card-tipo.t1{background:var(--danger-bg);color:var(--danger-txt);border-color:var(--danger-bdr)}
.card-tipo.t2{background:var(--ok-bg);color:var(--ok-txt);border-color:var(--ok-bdr)}
.card-tipo.t3{background:var(--info-bg);color:var(--info-txt);border-color:var(--info-bdr)}
.card-tipo.ver{background:var(--warn-bg);color:var(--warn-txt);border-color:var(--warn-bdr)}
.card-cod{font-family:var(--mono);font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-body{padding:12px 14px;transition:opacity .2s}
.card.done .card-body{opacity:.55}
.card-desc{font-size:13px;font-weight:600;margin-bottom:8px}

/* MOVE ROW */
.move-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:8px}
.move-box{padding:8px 10px;border-radius:var(--r);border:1px solid}
.move-box.origen {background:var(--danger-bg);border-color:var(--danger-bdr)}
.move-box.destino{background:var(--ok-bg);border-color:var(--ok-bdr)}
.move-box.neutro {background:var(--surface2);border-color:var(--border-md)}
.move-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px}
.move-ubic{font-family:var(--mono);font-size:14px;font-weight:700}
.move-subtipo{font-size:10px;color:var(--text2);margin-top:2px;text-transform:capitalize}
.move-arrow{text-align:center;font-size:22px;color:var(--text3)}
.move-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin:10px 0 6px;padding-top:10px;border-top:1px solid var(--border)}

/* META */
.meta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:11px;color:var(--text2)}
.meta-item span{color:var(--text);font-weight:500}

/* CAMPOS */
.campo-group{margin-top:10px}
.campo-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.campo-qty{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.campo-qty label{font-size:11px;color:var(--text2);white-space:nowrap}
.campo-qty input{width:100px;font-size:13px;padding:6px 9px;border:1px solid var(--border-md);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.campo-qty input:focus{outline:none;border-color:var(--text3)}
.campo-obs{width:100%;font-size:12px;padding:7px 9px;border:1px solid var(--border-md);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);resize:none;line-height:1.4}
.campo-obs:focus{outline:none;border-color:var(--text3)}

/* WARN */
.warn-box{padding:7px 10px;background:var(--warn-bg);border:1px solid var(--warn-bdr);border-radius:var(--r);font-size:11px;color:var(--warn-txt);margin-bottom:8px}

/* BTN HECHO */
.btn-hecho{width:100%;margin-top:10px;padding:10px;border-radius:var(--r);border:1px solid var(--ok-bdr);background:var(--ok-bg);color:var(--ok-txt);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-hecho:hover{background:var(--ok-txt);color:#fff}
.card.done .btn-hecho{background:var(--ok-txt);color:#fff;border-color:var(--ok-txt)}

/* LOADING / ERROR */
.state{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;padding:24px;text-align:center}
.state h2{font-size:16px;font-weight:500}
.state p{font-size:13px;color:var(--text2);max-width:340px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading" class="state">
  <div class="spinner"></div>
  <h2>Cargando orden de trabajo…</h2>
</div>

<div id="error" class="state" style="display:none">
  <h2>No se pudo cargar la OT</h2>
  <p id="error-msg">El enlace no contiene datos válidos o ha expirado.</p>
</div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-left">
      <h1 id="ot-titulo">—</h1>
      <p id="ot-meta">—</p>
    </div>
    <div class="hdr-right">
      <button class="btn-teams" onclick="enviarResumen()">
        <svg viewBox="0 0 24 24" fill="white"><path d="M19.5 4.5h-15A1.5 1.5 0 003 6v12a1.5 1.5 0 001.5 1.5h15A1.5 1.5 0 0021 18V6a1.5 1.5 0 00-1.5-1.5zm-8.25 9.75H9v-5.5h1.5v2h1.5v-2H13.5v5.5H12v-2h-1.5v2h-.75zm6 0h-3v-5.5h3v1.25h-1.5v.75H16v1.25h-1.5v.75H18v1.5z"/></svg>
        Enviar resumen
      </button>
    </div>
  </div>
  <div class="prog-bar">
    <span id="prog-txt">0 completados</span>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="content" id="ot-content"></div>
</div>

<script>
const CHAT_ID = '19:9eb5229f45ee49dd9c837d7c8cb988a7@thread.v2';
let OT_DATA = null;

/* ── DESCOMPRIMIR Y PARSEAR ── */
async function decompress(b64) {
  const bin  = atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
  const buf  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  const ds   = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  writer.write(buf); writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const out   = new Uint8Array(total);
  let offset  = 0;
  chunks.forEach(c => { out.set(c, offset); offset += c.length; });
  return new TextDecoder().decode(out);
}

async function init() {
  try {
    const params = new URLSearchParams(location.search);
    const d = params.get('d');
    if (!d) throw new Error('Sin parámetro de datos en la URL.');
    const json = await decompress(d);
    OT_DATA = JSON.parse(json);
    renderOT(OT_DATA);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
    document.getElementById('error-msg').textContent = e.message || 'Error desconocido.';
  }
}

/* ── RENDER ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderOT(data) {
  document.getElementById('ot-titulo').textContent = data.titulo;
  document.getElementById('ot-meta').textContent   = data.meta;
  document.title = data.titulo;

  const content = document.getElementById('ot-content');
  content.innerHTML = data.items.map((item, i) => renderCard(item, i)).join('');

  actualizarProgreso();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function renderCard(item, i) {
  const tipoCls = { verificar:'ver', picking_ocioso:'t1', alta_rot_sobrestock:'t2', cruce:'t3' }[item.tipo] || 'ver';
  const tipoLbl = { verificar:'Verificar', picking_ocioso:'Picking ocioso', alta_rot_sobrestock:'Alta rot. sobrestock', cruce:'Cruce óptimo' }[item.tipo] || item.tipo;

  let cuerpo = '';

  if (item.tipo === 'verificar') {
    // Ubicaciones
    let ubics = `<div class="move-box neutro" style="margin-bottom:6px">
      <div class="move-label">Ubicación picking</div>
      <div class="move-ubic">${esc(item.ubic_picking || '—')}</div>
    </div>`;
    if (item.ubic_alt1) ubics += `<div class="move-box origen" style="margin-bottom:4px">
      <div class="move-label">Sobrestock Alt 1</div>
      <div class="move-ubic">${esc(item.ubic_alt1)}</div>
    </div>`;
    if (item.ubic_alt2) ubics += `<div class="move-box origen" style="margin-bottom:4px">
      <div class="move-label">Sobrestock Alt 2</div>
      <div class="move-ubic">${esc(item.ubic_alt2)}</div>
    </div>`;

    cuerpo = `
      <div class="card-desc">${esc(item.desc)}</div>
      <div class="meta-row">
        ${item.sistema !== undefined ? `<div class="meta-item">Sistema: <span${item.sistema < 0 ? ' style="color:var(--danger-txt)"' : ''}>${item.sistema} ud.</span></div>` : ''}
        ${item.alt_sum  ? `<div class="meta-item">Alt registrado: <span>${item.alt_sum} ud.</span></div>` : ''}
        ${item.dif      ? `<div class="meta-item">Diferencia: <span style="color:var(--warn-txt)">+${item.dif} ud.</span></div>` : ''}
      </div>
      ${ubics}
      <div class="campo-group">
        <div class="campo-qty">
          <label>Cantidad contada:</label>
          <input type="number" min="0" placeholder="0 ud." id="qty-${i}">
        </div>
        <div class="campo-lbl">Observaciones</div>
        <textarea class="campo-obs" rows="2" placeholder="Anota cualquier incidencia…" id="obs-${i}"></textarea>
      </div>`;

  } else if (item.tipo === 'cruce') {
    cuerpo = `
      <div class="card-desc">${esc(item.cod1)} ↔ ${esc(item.cod2)}</div>
      <div class="move-section-lbl" style="border-top:none;padding-top:0;margin-top:0">Movimiento 1 — sacar del picking</div>
      <div class="move-row">
        <div class="move-box origen">
          <div class="move-label">Origen (picking)</div>
          <div class="move-ubic">${esc(item.desde1 || '—')}</div>
          <div class="move-subtipo">picking</div>
        </div>
        <div class="move-arrow">→</div>
        <div class="move-box destino">
          <div class="move-label">Destino (sobrestock)</div>
          <div class="move-ubic">${esc(item.hasta1 || '—')}</div>
          <div class="move-subtipo">sobrestock</div>
        </div>
      </div>
      <div class="meta-row">
        <div class="meta-item">Producto: <span>${esc(item.cod1)}</span></div>
        <div class="meta-item">Stock: <span>${item.exist1} ud.</span></div>
        <div class="meta-item">Rot./mes: <span>0 ud.</span></div>
      </div>
      <div class="move-section-lbl">Movimiento 2 — subir al picking</div>
      <div class="move-row">
        <div class="move-box origen">
          <div class="move-label">Origen (sobrestock)</div>
          <div class="move-ubic">${esc(item.desde2 || '—')}</div>
          <div class="move-subtipo">sobrestock</div>
        </div>
        <div class="move-arrow">→</div>
        <div class="move-box destino">
          <div class="move-label">Destino (picking)</div>
          <div class="move-ubic">${esc(item.hasta2 || '—')}</div>
          <div class="move-subtipo">picking</div>
        </div>
      </div>
      <div class="meta-row">
        <div class="meta-item">Producto: <span>${esc(item.cod2)}</span></div>
        <div class="meta-item">Stock: <span>${item.exist2} ud.</span></div>
        <div class="meta-item">Rot./mes: <span>${item.rot2} ud.</span></div>
      </div>
      <div class="campo-lbl">Observaciones</div>
      <textarea class="campo-obs" rows="2" placeholder="Anota cualquier incidencia…" id="obs-${i}"></textarea>`;

  } else {
    // picking_ocioso o alta_rot_sobrestock
    const desdeCls  = item.tipo === 'picking_ocioso' ? 'origen' : 'origen';
    const hastaCls  = item.hasta ? 'destino' : 'neutro';
    cuerpo = `
      <div class="card-desc">${esc(item.desc)}</div>
      <div class="move-row">
        <div class="move-box ${desdeCls}">
          <div class="move-label">Origen</div>
          <div class="move-ubic">${esc(item.desde || '—')}</div>
          <div class="move-subtipo">${esc(item.tipo_desde || '')}</div>
        </div>
        <div class="move-arrow">→</div>
        <div class="move-box ${hastaCls}">
          <div class="move-label">Destino</div>
          <div class="move-ubic">${esc(item.hasta || 'SIN DESTINO')}</div>
          <div class="move-subtipo">${esc(item.tipo_hasta || '')}</div>
        </div>
      </div>
      ${!item.hasta ? '<div class="warn-box">⚠ Sin ubicación libre disponible — coordina con el responsable antes de mover</div>' : ''}
      <div class="meta-row">
        <div class="meta-item">Código: <span>${esc(item.cod)}</span></div>
        <div class="meta-item">Stock: <span>${item.exist} ud.</span></div>
        <div class="meta-item">Rot./mes: <span>${item.rot1} ud.</span></div>
      </div>
      <div class="campo-lbl">Observaciones</div>
      <textarea class="campo-obs" rows="2" placeholder="Anota cualquier incidencia…" id="obs-${i}"></textarea>`;
  }

  return `<div class="card" id="card-${i}">
    <div class="card-hdr">
      <div class="card-num" id="num-${i}">${i+1}</div>
      <span class="card-tipo ${tipoCls}">${tipoLbl}</span>
      <span class="card-cod">${esc(item.cod || item.cod1 || '')} ${item.desc ? '— ' + item.desc.substring(0,40) : ''}</span>
    </div>
    <div class="card-body">${cuerpo}</div>
    <div style="padding:0 14px 14px">
      <button class="btn-hecho" id="btn-${i}" onclick="marcarHecho(${i})">Marcar como hecho</button>
    </div>
  </div>`;
}

/* ── INTERACTIVIDAD ── */
function marcarHecho(i) {
  const card = document.getElementById('card-' + i);
  const btn  = document.getElementById('btn-' + i);
  const done = card.classList.toggle('done');
  btn.textContent = done ? '✓ Hecho' : 'Marcar como hecho';
  actualizarProgreso();
}

function actualizarProgreso() {
  const total = document.querySelectorAll('.card').length;
  const done  = document.querySelectorAll('.card.done').length;
  document.getElementById('prog-txt').textContent = done + ' de ' + total + ' completados';
  document.getElementById('prog-fill').style.width = total ? Math.round(done/total*100) + '%' : '0%';
}

/* ── ENVIAR RESUMEN A TEAMS ── */
function enviarResumen() {
  const btn    = document.querySelector('.btn-teams');
  const cards  = document.querySelectorAll('.card');
  const titulo = OT_DATA?.titulo || 'OT';
  const meta   = OT_DATA?.meta   || '';

  let txt = '\uD83D\uDCCB RESUMEN OT \u2014 ' + titulo + '\n' + meta + '\n\n';
  cards.forEach((card, i) => {
    const done = card.classList.contains('done');
    const ok   = done ? '\u2705' : '\u23F3';
    const cod  = card.querySelector('.card-cod')?.textContent?.trim() || '';
    const obs  = document.getElementById('obs-' + i)?.value?.trim() || '';
    const qty  = document.getElementById('qty-' + i)?.value?.trim() || '';
    txt += ok + ' ' + (i+1) + '. ' + cod;
    if (qty) txt += ' | Contado: ' + qty + ' ud.';
    if (obs) txt += ' | ' + obs;
    txt += '\n';
  });
  txt += '\n\u2014 App Gesti\u00f3n Almac\u00e9n A';

  navigator.clipboard.writeText(txt).catch(() => {});

  const orig = btn.innerHTML;
  btn.innerHTML = '\u2713 Copiado \u2014 pega en el chat (Ctrl+V)';
  btn.style.background = 'var(--ok-txt)';

  setTimeout(() => {
    window.location.href = 'msteams://teams.microsoft.com/l/chat/' + CHAT_ID + '/0';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#5059C9'; }, 3000);
  }, 600);
}

init();
</script>
</body>
</html>
